<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Aptechka Tizimi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        h2 {
            margin-bottom: 20px;
            color: #333;
        }
        h3 {
            margin-top: 20px;
            margin-bottom: 15px;
            color: #333;
        }
        table {
            border: 1px solid #ddd;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f8f9fa;
            font-weight: bold;
        }
        form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        input[type="text"],
        input[type="number"],
        input[type="date"] {
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            padding: 6px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        hr {
            margin: 20px 0;
            border: none;
            border-top: 2px solid #ddd;
        }
        p {
            margin: 5px 0;
        }
        .btn-success, .btn-danger {
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 4px;
            display: inline-block;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🏥 {{session['company_name']}}</h2>

        {% for a in alerts %}
        <p style="color:red">{{a}}</p>
        {% endfor %}

        <a href="/excel" class="btn btn-success">📥 Excel</a>
        <a href="/pdf" class="btn btn-danger">📄 PDF</a>

        <hr>

        <h3>➕ Dori qo'shish</h3>

        <form action="/add" method="post">
            <input name="name" placeholder="Dori">
            <input name="qty" placeholder="Miqdor">
            <input name="expiry" type="date">
            <button>Qo'shish</button>
        </form>

        <hr>

        <h3>💊 Dorilar</h3>

        <table border="1" cellpadding="8">
        <tr>
        <th>Dori</th>
        <th>Qoldiq</th>
        <th>Srogi</th>
        <th>Berish</th>
        </tr>

        {% for m in meds %}
        <tr>
        <td>{{m.name}}</td>
        <td>{{m.left_qty}}</td>
        <td>{{m.expiry_date}}</td>
        <td>

        <form action="/give" method="post">
        <input type="hidden" name="med_id" value="{{m.id}}">
        <input name="qty" placeholder="soni">
        <input name="person" placeholder="kimga">
        <button>Berish</button>
        </form>

        </td>
        </tr>
        {% endfor %}
        </table>
    </div>
</body>
</html>
